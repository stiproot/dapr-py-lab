apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  metadata:
  - name: redisHost
    value: localhost:6378
  - name: redisPassword
    value: ""
  # - name: redisDB
  #   value: "0"
  # - name: actorStateStore
  #   value: "true"
  # - name: queryIndexName
  #   value: "pkidx"
  # - name: contentType
  #   value: "application/json"
  - name: keyPrefix
    value: "none"
  - name: queryIndexes
    value: |
      [
        {
          "name": "idx",
          "indexes": [
            {
              "key": "partitionKey",
              "type": "TEXT"
            }
          ]
        },
        {
          "name": "pidx",
          "indexes": [
            {
              "key": "__metadata__.project_id",
              "type": "TEXT"
            }
          ]
        }
      ]      